<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club des Coiffeurs VIP | Premium Barbershop Gatineau</title>

<meta name="description" content="Premium barbershop in Gatineau. Haircuts, beard trims and VIP grooming services. Book online at Club des Coiffeurs VIP.">

<meta name="keywords" content="barber Gatineau, barbershop Gatineau, haircut Gatineau, fade Gatineau, men's haircut Gatineau">

<meta name="author" content="Club des Coiffeurs VIP">
<meta name="theme-color" content="#0a0a0a">

<meta property="og:title" content="Club des Coiffeurs VIP">
<meta property="og:description" content="Premium Barbershop in Gatineau">
<meta property="og:image" content="logo.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#0a0a0a;color:#fff;}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:42px;margin-bottom:10px;}

.btn-primary{
background:#D4AF37;
color:#000;
padding:14px 30px;
border-radius:40px;
text-decoration:none;
font-weight:600;
}

section{padding:80px 20px;text-align:center;}

h2{color:#D4AF37;margin-bottom:40px;}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.service{
padding:20px;
background:#111;
border-radius:15px;
}

.service:hover{
transform:translateY(-5px);
border:1px solid #D4AF37;
transition:0.3s;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MODAL IMAGEN */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
}

#modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<section class="hero">
<h1>Club des Coiffeurs VIP</h1>
<p>Premium Barbershop – Gatineau</p>

<a href="https://app.squareup.com/appointments/book/84142bqteeinvp/LJRMN6ZQYMG9A/start"
class="btn-primary">🔥 Réserver Maintenant</a>

<br><br>

<a href="https://www.instagram.com/club_des_coiffeurs_vip" style="color:#D4AF37;">
Instagram
</a>

</section>

<section>
<h2>Nos Services</h2>

<div class="services">
<div class="service">Coupe – $35</div>
<div class="service">Barbe – $25</div>
<div class="service">Coupe + Barbe – $45</div>
<div class="service">VIP – $55</div>
</div>
</section>

<section>
<h2>Galerie</h2>

<div class="gallery">

<img src="imagenes/foto1.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto2.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto3.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto4.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto5.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto6.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto7.jpg" onclick="openModal(this.src)">
<img src="imagenes/foto8.jpg" onclick="openModal(this.src)">

</div>
</section>

<div id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<section>
<h2>Contacto</h2>
<p>📍 187 Rue Eddy, Gatineau</p>
<p>📞 819-639-5598</p>
</section>

<footer>
© 2026 Club des Coiffeurs VIP
</footer>

<script>

function openModal(src){
document.getElementById("modal").style.display="flex"
document.getElementById("modalImg").src=src
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
