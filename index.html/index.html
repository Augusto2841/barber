<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club des Coiffeurs VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#ffffff;
color:#111;
}

/* HEADER */

.top-header{
background:#000;
color:white;
text-align:center;
padding:60px 20px;
}

.logo{
width:160px;
margin-bottom:25px;
opacity:0.9;
}

.language-switch{
position:absolute;
top:20px;
right:20px;
}

.language-switch button{
background:transparent;
border:1px solid white;
color:white;
padding:5px 10px;
margin-left:5px;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

.top-buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.top-buttons a{
padding:12px 28px;
border-radius:40px;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:0.3s ease;
}

.btn-primary{
background:#ffffff;
color:#000;
}

.btn-outline{
border:1px solid rgba(255,255,255,0.7);
color:white;
background:transparent;
}

/* SECTIONS */

section{
padding:70px 20px;
text-align:center;
}

h2{
margin-bottom:40px;
font-size:28px;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.service{
width:260px;
padding:25px;
border:1px solid #eaeaea;
border-radius:12px;
background:#fff;
}

.price{
font-size:20px;
font-weight:700;
margin-top:15px;
}

.vip{
border:2px solid #000;
background:#000;
color:white;
}

.vip .price{
color:#FFD700;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.gallery img{
width:260px;
height:260px;
object-fit:cover;
border-radius:10px;
}

footer{
background:#000;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header class="top-header">

<div class="language-switch">
<button onclick="setLanguage('fr')">FR</button>
<button onclick="setLanguage('en')">EN</button>
<button onclick="setLanguage('es')">ES</button>
</div>

<img src="logo.jpg" class="logo">

<h1 id="title">Club des Coiffeurs VIP</h1>
<p id="subtitle">Salon de Coiffure – Gatineau, Québec</p>

<div class="top-buttons">
<a href="https://app.squareup.com/appointments/book/84142bqteeinvp/LJRMN6ZQYMG9A/start" target="_top" class="btn-primary" id="btnReserve">Réserver</a>
<a href="https://wa.me/18196395598" target="_blank" class="btn-outline">WhatsApp</a>
<a href="tel:18196395598" class="btn-outline" id="btnCall">Appeler</a>
<a href="https://www.instagram.com/vip_club_barber" target="_blank" class="btn-outline">Instagram</a>
</div>

</header>

<section>
<h2 id="servicesTitle">Nos Services</h2>

<div class="services">

<div class="service">
<h3 id="s1">Marcar Contornos</h3>
<div class="price">$15</div>
</div>

<div class="service">
<h3 id="s2">Corte para Niños</h3>
<div class="price">$25</div>
</div>

<div class="service">
<h3 id="s3">Corte Regular</h3>
<div class="price">$35</div>
</div>

<div class="service">
<h3 id="s4">Rasurado Cabeza y Barba</h3>
<div class="price">$40</div>
</div>

<div class="service">
<h3 id="s5">Corte + Barba</h3>
<div class="price">$45</div>
</div>

<div class="service vip">
<h3 id="s6">Corte VIP</h3>
<div class="price">$55</div>
</div>

</div>
</section>

<section>
<h2 id="galleryTitle">Galerie</h2>

<div class="gallery">
<img src="imagenes/foto1.jpg">
<img src="imagenes/foto2.jpg">
<img src="imagenes/foto3jpg.jpg">
<img src="imagenes/foto4.jpg">
<img src="imagenes/foto5.jpg">
<img src="imagenes/foto6.jpg">
<img src="imagenes/foto7.jpg">
</div>

</section>

<footer>
© 2026 Club des Coiffeurs VIP
</footer>

<script>
function setLanguage(lang){

if(lang === "fr"){
document.getElementById("subtitle").innerText = "Salon de Coiffure – Gatineau, Québec";
document.getElementById("servicesTitle").innerText = "Nos Services";
document.getElementById("galleryTitle").innerText = "Galerie";
document.getElementById("btnReserve").innerText = "Réserver";
document.getElementById("btnCall").innerText = "Appeler";
}

if(lang === "en"){
document.getElementById("subtitle").innerText = "Hair Salon – Gatineau, Quebec";
document.getElementById("servicesTitle").innerText = "Our Services";
document.getElementById("galleryTitle").innerText = "Gallery";
document.getElementById("btnReserve").innerText = "Book Now";
document.getElementById("btnCall").innerText = "Call";
}

if(lang === "es"){
document.getElementById("subtitle").innerText = "Salón de Barbería – Gatineau, Quebec";
document.getElementById("servicesTitle").innerText = "Nuestros Servicios";
document.getElementById("galleryTitle").innerText = "Galería";
document.getElementById("btnReserve").innerText = "Reservar";
document.getElementById("btnCall").innerText = "Llamar";
}

}
</script>

</body>
</html>
